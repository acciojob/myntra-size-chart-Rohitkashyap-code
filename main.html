<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">

	    <style>
        table {
            width: 60%;
            border-collapse: collapse;
            margin: 20px auto;
            text-align: center;
            font-family: Arial, sans-serif;
        }
        th, td {
            border: 1px solid #000;
            padding: 10px;
        }
        thead {
            background-color: #f2f2f2;
        }
        h2 {
            text-align: center;
        }
    </style>

</head>
	

<body>
	<table border="2" cellspacing="0" width="60%">
    <caption>Size Chart</caption>

    <!-- Header Row -->
    <thead>
        <tr>
            <th>Size</th>
            <th>Chest (in)</th>
            <th>Waist (in)</th>
            <th>Hip (in)</th>
        </tr>
    </thead>

    <!-- Data Rows -->
    <tbody>
        <tr>
            <td>XS</td>
            <td>34-36</td>
            <td>28-30</td>
            <td>34-36</td>
        </tr>
        <tr>
            <td>S</td>
            <td>36-38</td>
            <td>30-32</td>
            <td>36-38</td>
        </tr>
        <tr>
            <td>M</td>
            <td>38-40</td>
            <td>32-34</td>
            <td>38-40</td>
        </tr>
        <tr>
            <td>L</td>
            <td>40-42</td>
            <td>34-36</td>
            <td>40-42</td>
        </tr>
        <tr>
            <td>XL</td>
            <td>42-44</td>
            <td>36-38</td>
            <td>42-44</td>
        </tr>
    </tbody>

</table>

</body>

</html>
